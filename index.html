<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相片拼貼工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #252530;
    --border: #2e2e3a;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --radius: 10px;
    --gap: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text-dim); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ─── Left Panel ─── */
  .panel {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Layout templates */
  .layouts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .layout-btn {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    transition: all 0.15s;
  }

  .layout-btn:hover { border-color: var(--accent); }
  .layout-btn.active { border-color: var(--accent); background: rgba(200,240,96,0.08); }

  .layout-btn svg { width: 100%; height: 100%; }

  /* Photo slots strip */
  .photos-strip {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .photo-thumb {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
    border: 1.5px dashed var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .photo-thumb:hover { border-color: var(--accent2); }

  .photo-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  .photo-thumb.filled img { display: block; }
  .photo-thumb.filled .thumb-placeholder { display: none; }

  .thumb-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-dim); font-size: 11px;
  }

  .thumb-remove {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border: none; border-radius: 50%; color: #fff;
    font-size: 12px; cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
  }

  .photo-thumb.filled:hover .thumb-remove { display: flex; }

  /* Controls */
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .control-label { font-size: 12px; color: var(--text-dim); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100px; height: 3px;
    background: var(--border);
    border-radius: 2px; outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    background: var(--accent);
    border-radius: 50%; cursor: pointer;
  }

  input[type=color] {
    -webkit-appearance: none;
    width: 32px; height: 24px;
    border: 1.5px solid var(--border);
    border-radius: 4px; cursor: pointer;
    background: none; padding: 1px;
  }

  .ratio-btns {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .ratio-btn {
    padding: 4px 10px;
    font-size: 11px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .ratio-btn:hover { border-color: var(--accent2); color: var(--text); }
  .ratio-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.08); }

  /* ─── Canvas Area ─── */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: auto;
    background: repeating-conic-gradient(#1a1a22 0% 25%, #141418 0% 50%) 0 0/24px 24px;
  }

  #collage-wrapper {
    position: relative;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    transition: width 0.3s, height 0.3s;
  }

  #collage-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    pointer-events: none;
  }

  .cell {
    position: absolute;
    overflow: hidden;
    cursor: pointer;
    background: #e0e0e0;
  }

  .cell::after {
    content: '';
    position: absolute; inset: 0;
    border: 1px solid rgba(255,255,255,0.3);
    pointer-events: none;
  }

  .cell .cell-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  .cell.has-img .cell-img { display: block; }

  .cell .cell-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: #aaa; font-size: 13px;
    transition: background 0.15s;
  }

  .cell.has-img .cell-placeholder { display: none; }

  .cell:hover .cell-placeholder { background: rgba(0,0,0,0.04); }

  .cell.drag-over .cell-placeholder { background: rgba(100,180,255,0.15); }

  /* Zoom controls */
  .cell-zoom-controls {
    position: absolute; bottom: 6px; right: 6px;
    display: none; gap: 4px; z-index: 10;
  }

  .cell.has-img:hover .cell-zoom-controls { display: flex; }

  .zoom-btn {
    width: 24px; height: 24px;
    background: rgba(0,0,0,0.6);
    border: none; border-radius: 4px;
    color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }

  .zoom-btn:hover { background: rgba(0,0,0,0.85); }

  /* ─── Bottom toolbar ─── */
  .bottom-bar {
    padding: 14px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }

  .btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .btn-primary {
    background: var(--accent);
    color: #111;
  }

  .btn-primary:hover { background: #d8ff70; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent2); }

  .upload-all-btn {
    background: var(--surface2);
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
  }

  .upload-all-btn:hover { background: rgba(96,200,240,0.1); }

  .spacer { flex: 1; }

  /* hidden file input */
  #file-input { display: none; }

  /* ─── Drag ghost ─── */
  .drag-ghost {
    position: fixed; pointer-events: none;
    width: 80px; height: 60px; object-fit: cover;
    border-radius: 4px; opacity: 0.8;
    transform: translate(-50%, -50%);
    display: none; z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .size-display {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <div class="logo">COLLAGE<span>/maker</span></div>
</header>

<div class="main">
  <!-- Left Panel -->
  <div class="panel">

    <!-- Layout -->
    <div class="panel-section">
      <div class="section-title">版面配置</div>
      <div class="layouts" id="layouts">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Aspect Ratio -->
    <div class="panel-section">
      <div class="section-title">畫布比例</div>
      <div class="ratio-btns" id="ratio-btns">
        <button class="ratio-btn active" data-w="4" data-h="3">4:3</button>
        <button class="ratio-btn" data-w="16" data-h="9">16:9</button>
        <button class="ratio-btn" data-w="1" data-h="1">1:1</button>
        <button class="ratio-btn" data-w="3" data-h="4">3:4</button>
        <button class="ratio-btn" data-w="9" data-h="16">9:16</button>
        <button class="ratio-btn" data-w="2" data-h="3">2:3</button>
      </div>
    </div>

    <!-- Gap -->
    <div class="panel-section">
      <div class="control-row">
        <span class="control-label">間距</span>
        <input type="range" id="gap-slider" min="0" max="20" value="4">
      </div>
      <!-- Border radius -->
      <div class="control-row">
        <span class="control-label">圓角</span>
        <input type="range" id="radius-slider" min="0" max="30" value="0">
      </div>
      <!-- Background -->
      <div class="control-row">
        <span class="control-label">背景色</span>
        <input type="color" id="bg-color" value="#ffffff">
      </div>
    </div>

    <!-- Photos -->
    <div class="panel-section" style="flex:1">
      <div class="section-title">已上傳相片</div>
      <div class="photos-strip" id="photos-strip"></div>
    </div>

  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvas-area">
    <div id="collage-wrapper">
      <!-- cells injected by JS -->
    </div>
  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn upload-all-btn" id="upload-btn">📁 上傳相片</button>
  <input type="file" id="file-input" accept="image/*" multiple>
  <div class="spacer"></div>
  <span class="size-display" id="size-display">800 × 600 px</span>
  <button class="btn btn-secondary" id="clear-btn">清除全部</button>
  <button class="btn btn-primary" id="download-btn">⬇ 下載拼貼</button>
</div>

<img class="drag-ghost" id="drag-ghost">

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  layout: 0,
  ratio: { w: 4, h: 3 },
  gap: 4,
  radius: 0,
  bgColor: '#ffffff',
  images: [],      // { src, scale, offsetX, offsetY } per cell
  cellCount: 0,
  draggingFrom: null,  // panel thumb index
};

const CANVAS_MAX = 700;

// ─── Layout Definitions ───────────────────────────────────────────────────────
// Each layout = array of cells: { x, y, w, h } (0–1 fractions)
const LAYOUTS = [
  // 1-up
  { name:'1', cells:[{x:0,y:0,w:1,h:1}] },
  // 2 side by side
  { name:'2H', cells:[{x:0,y:0,w:.5,h:1},{x:.5,y:0,w:.5,h:1}] },
  // 2 top-bottom
  { name:'2V', cells:[{x:0,y:0,w:1,h:.5},{x:0,y:.5,w:1,h:.5}] },
  // 3 left big + 2 right
  { name:'3A', cells:[{x:0,y:0,w:.5,h:1},{x:.5,y:0,w:.5,h:.5},{x:.5,y:.5,w:.5,h:.5}] },
  // 3 top big + 2 bottom
  { name:'3B', cells:[{x:0,y:0,w:1,h:.5},{x:0,y:.5,w:.5,h:.5},{x:.5,y:.5,w:.5,h:.5}] },
  // 3 equal columns
  { name:'3C', cells:[{x:0,y:0,w:1/3,h:1},{x:1/3,y:0,w:1/3,h:1},{x:2/3,y:0,w:1/3,h:1}] },
  // 4 grid
  { name:'4', cells:[{x:0,y:0,w:.5,h:.5},{x:.5,y:0,w:.5,h:.5},{x:0,y:.5,w:.5,h:.5},{x:.5,y:.5,w:.5,h:.5}] },
  // 4 left big
  { name:'4L', cells:[{x:0,y:0,w:.6,h:1},{x:.6,y:0,w:.4,h:1/3},{x:.6,y:1/3,w:.4,h:1/3},{x:.6,y:2/3,w:.4,h:1/3}] },
  // 5 magazine
  { name:'5', cells:[{x:0,y:0,w:.5,h:.5},{x:.5,y:0,w:.5,h:.5},{x:0,y:.5,w:1/3,h:.5},{x:1/3,y:.5,w:1/3,h:.5},{x:2/3,y:.5,w:1/3,h:.5}] },
  // 6 grid
  { name:'6', cells:[{x:0,y:0,w:1/3,h:.5},{x:1/3,y:0,w:1/3,h:.5},{x:2/3,y:0,w:1/3,h:.5},{x:0,y:.5,w:1/3,h:.5},{x:1/3,y:.5,w:1/3,h:.5},{x:2/3,y:.5,w:1/3,h:.5}] },
  // diagonal big left
  { name:'DL', cells:[{x:0,y:0,w:.6,h:.6},{x:.6,y:0,w:.4,h:.6},{x:0,y:.6,w:.4,h:.4},{x:.4,y:.6,w:.6,h:.4}] },
  // 3 rows unequal
  { name:'3R', cells:[{x:0,y:0,w:1,h:.4},{x:0,y:.4,w:.5,h:.6},{x:.5,y:.4,w:.5,h:.6}] },
];

// SVG previews for layouts
function layoutSVG(layout) {
  const cells = layout.cells;
  const rects = cells.map(c => {
    const x = 2 + c.x * 46;
    const y = 2 + c.y * 46;
    const w = c.w * 46 - 1;
    const h = c.h * 46 - 1;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="1" fill="currentColor" opacity="0.6"/>`;
  }).join('');
  return `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" style="color:var(--accent)">${rects}</svg>`;
}

// ─── Init Layout Buttons ──────────────────────────────────────────────────────
const layoutsEl = document.getElementById('layouts');
LAYOUTS.forEach((l, i) => {
  const btn = document.createElement('button');
  btn.className = 'layout-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = layoutSVG(l);
  btn.title = l.name;
  btn.onclick = () => {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.layout = i;
    renderCollage();
  };
  layoutsEl.appendChild(btn);
});

// ─── Ratio Buttons ────────────────────────────────────────────────────────────
document.getElementById('ratio-btns').addEventListener('click', e => {
  const btn = e.target.closest('.ratio-btn');
  if (!btn) return;
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.ratio = { w: +btn.dataset.w, h: +btn.dataset.h };
  renderCollage();
});

// ─── Sliders & Color ─────────────────────────────────────────────────────────
document.getElementById('gap-slider').addEventListener('input', e => {
  state.gap = +e.target.value;
  renderCollage();
});
document.getElementById('radius-slider').addEventListener('input', e => {
  state.radius = +e.target.value;
  renderCollage();
});
document.getElementById('bg-color').addEventListener('input', e => {
  state.bgColor = e.target.value;
  document.getElementById('collage-wrapper').style.background = state.bgColor;
});

// ─── Canvas Sizing ────────────────────────────────────────────────────────────
function getCanvasSize() {
  const { w, h } = state.ratio;
  let cw, ch;
  if (w >= h) {
    cw = CANVAS_MAX;
    ch = Math.round(CANVAS_MAX * h / w);
  } else {
    ch = CANVAS_MAX;
    cw = Math.round(CANVAS_MAX * w / h);
  }
  return { cw, ch };
}

// ─── Render Collage ───────────────────────────────────────────────────────────
function renderCollage() {
  const wrapper = document.getElementById('collage-wrapper');
  const { cw, ch } = getCanvasSize();
  wrapper.style.width = cw + 'px';
  wrapper.style.height = ch + 'px';
  wrapper.style.background = state.bgColor;
  document.getElementById('size-display').textContent = `${cw} × ${ch} px`;

  const layout = LAYOUTS[state.layout];
  const gap = state.gap;
  const radius = state.radius;

  // Ensure images array has enough slots
  while (state.images.length < layout.cells.length) {
    state.images.push(null);
  }
  state.cellCount = layout.cells.length;

  // Remove old cells
  wrapper.querySelectorAll('.cell').forEach(c => c.remove());

  layout.cells.forEach((cell, idx) => {
    const el = document.createElement('div');
    el.className = 'cell';

    const x = cell.x * cw + gap / 2;
    const y = cell.y * ch + gap / 2;
    const w = cell.w * cw - gap;
    const h = cell.h * ch - gap;

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    el.style.borderRadius = radius + 'px';

    // Placeholder
    const ph = document.createElement('div');
    ph.className = 'cell-placeholder';
    ph.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>點擊上傳</span>`;
    el.appendChild(ph);

    // Image
    const img = document.createElement('img');
    img.className = 'cell-img';
    img.draggable = false;
    el.appendChild(img);

    // Zoom controls
    const zc = document.createElement('div');
    zc.className = 'cell-zoom-controls';
    zc.innerHTML = `<button class="zoom-btn" data-dir="in">+</button><button class="zoom-btn" data-dir="out">−</button>`;
    el.appendChild(zc);

    // Restore image if exists
    const imgState = state.images[idx];
    if (imgState) {
      el.classList.add('has-img');
      img.src = imgState.src;
      img.style.transform = `scale(${imgState.scale}) translate(${imgState.offsetX}px, ${imgState.offsetY}px)`;
    }

    el.dataset.idx = idx;

    // Click to upload
    el.addEventListener('click', () => {
      state._targetCell = idx;
      document.getElementById('file-input').click();
    });

    // Drag over (for reorder from panel)
    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const fromIdx = +e.dataTransfer.getData('cellIdx');
      if (!isNaN(fromIdx)) {
        swapCells(fromIdx, idx);
      }
    });

    // Zoom btns
    zc.querySelectorAll('.zoom-btn').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        const imgSt = state.images[idx];
        if (!imgSt) return;
        imgSt.scale = Math.max(0.5, Math.min(3, imgSt.scale + (b.dataset.dir === 'in' ? 0.15 : -0.15)));
        img.style.transform = `scale(${imgSt.scale}) translate(${imgSt.offsetX}px, ${imgSt.offsetY}px)`;
      });
    });

    // Drag to reorder
    if (imgState) {
      el.draggable = true;
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('cellIdx', idx);
        setTimeout(() => el.style.opacity = '0.5', 0);
      });
      el.addEventListener('dragend', () => el.style.opacity = '1');
    }

    wrapper.appendChild(el);
  });

  updatePhotoStrip();
}

function swapCells(a, b) {
  [state.images[a], state.images[b]] = [state.images[b], state.images[a]];
  renderCollage();
}

// ─── File Upload ─────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const files = [...e.target.files];
  files.forEach((file, fi) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      const targetIdx = state._targetCell !== undefined ? state._targetCell + fi : fi;
      if (targetIdx < state.cellCount) {
        state.images[targetIdx] = { src, scale: 1, offsetX: 0, offsetY: 0 };
      } else {
        // append to first empty slot
        for (let i = 0; i < state.cellCount; i++) {
          if (!state.images[i]) { state.images[i] = { src, scale: 1, offsetX: 0, offsetY: 0 }; break; }
        }
      }
      renderCollage();
    };
    reader.readAsDataURL(file);
  });
  state._targetCell = undefined;
  e.target.value = '';
});

document.getElementById('upload-btn').addEventListener('click', () => {
  state._targetCell = 0;
  document.getElementById('file-input').click();
});

// ─── Photo Strip ─────────────────────────────────────────────────────────────
function updatePhotoStrip() {
  const strip = document.getElementById('photos-strip');
  strip.innerHTML = '';
  for (let i = 0; i < state.cellCount; i++) {
    const imgSt = state.images[i];
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb' + (imgSt ? ' filled' : '');
    thumb.dataset.idx = i;

    const ph = document.createElement('div');
    ph.className = 'thumb-placeholder';
    ph.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>格子 ${i+1}</span>`;
    thumb.appendChild(ph);

    const img = document.createElement('img');
    if (imgSt) img.src = imgSt.src;
    thumb.appendChild(img);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'thumb-remove';
    removeBtn.textContent = '✕';
    removeBtn.title = '移除';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      state.images[i] = null;
      renderCollage();
    });
    thumb.appendChild(removeBtn);

    thumb.addEventListener('click', () => {
      state._targetCell = i;
      document.getElementById('file-input').click();
    });

    // Drag from strip
    if (imgSt) {
      thumb.draggable = true;
      thumb.addEventListener('dragstart', e => {
        e.dataTransfer.setData('cellIdx', i);
      });
    }

    strip.appendChild(thumb);
  }
}

// ─── Clear ────────────────────────────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  state.images = [];
  renderCollage();
});

// ─── Download ────────────────────────────────────────────────────────────────
document.getElementById('download-btn').addEventListener('click', async () => {
  const wrapper = document.getElementById('collage-wrapper');
  const { cw, ch } = getCanvasSize();
  const scale = 2; // 2x for quality

  const canvas = document.createElement('canvas');
  canvas.width = cw * scale;
  canvas.height = ch * scale;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const layout = LAYOUTS[state.layout];
  const gap = state.gap;
  const radius = state.radius;

  const drawPromises = layout.cells.map((cell, idx) => {
    return new Promise(resolve => {
      const imgSt = state.images[idx];
      if (!imgSt) { resolve(); return; }

      const x = (cell.x * cw + gap / 2) * scale;
      const y = (cell.y * ch + gap / 2) * scale;
      const w = (cell.w * cw - gap) * scale;
      const h = (cell.h * ch - gap) * scale;

      const img = new Image();
      img.onload = () => {
        ctx.save();
        // Clip with rounded rect
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(x, y, w, h, radius * scale);
        } else {
          ctx.rect(x, y, w, h);
        }
        ctx.clip();

        // Draw with scale
        const sc = imgSt.scale;
        const drawW = w * sc;
        const drawH = h * sc;
        const ox = (w - drawW) / 2 + imgSt.offsetX * scale * sc;
        const oy = (h - drawH) / 2 + imgSt.offsetY * scale * sc;

        ctx.drawImage(img, x + ox, y + oy, drawW, drawH);
        ctx.restore();
        resolve();
      };
      img.src = imgSt.src;
    });
  });

  await Promise.all(drawPromises);

  const link = document.createElement('a');
  link.download = 'collage.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
});

// ─── Bootstrap ───────────────────────────────────────────────────────────────
renderCollage();
</script>
